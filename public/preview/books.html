<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CampusShelf Preview - Book Listings (Search)</title>
  <link rel="stylesheet" href="./preview.css" />
</head>
<body>
<header>
  <div class="container">
    <h1 style="margin:0;">Search for Books (Preview)</h1>
    <small class="note">This page is a static preview to test search/filter UI without running Laravel.</small>
  </div>
</header>

<div class="container">
  <div class="searchbar">
    <input id="q" type="text" placeholder="Search title / course..." />
    <select id="format">
      <option value="">Format</option>
      <option>Paperback</option>
      <option>Hardcover</option>
      <option>Book Cover</option>
    </select>
    <select id="condition">
      <option value="">Condition</option>
      <option>Like New</option>
      <option>Good</option>
      <option>Fair</option>
    </select>
    <input id="min" type="number" min="0" step="1" placeholder="Min Price" style="width:120px;" />
    <input id="max" type="number" min="0" step="1" placeholder="Max Price" style="width:120px;" />
    <button id="btn">Search</button>
    <button onclick="resetBooks()" title="Reset demo data">Reset</button>
  </div>

  <div id="resultsMeta" style="margin: 6px 0 12px;"></div>
  <div id="grid" class="grid"></div>
</div>

<script src="./preview-data.js"></script>
<script>
function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    q: (p.get('q') || '').trim(),
    format: (p.get('format') || '').trim(),
    condition: (p.get('condition') || '').trim(),
    min: p.get('min_price'),
    max: p.get('max_price')
  };
}

function setInputsFromParams() {
  const p = getParams();
  document.getElementById('q').value = p.q;
  document.getElementById('format').value = p.format;
  document.getElementById('condition').value = p.condition;
  document.getElementById('min').value = (p.min ?? '');
  document.getElementById('max').value = (p.max ?? '');
}

function applySearch() {
  const q = document.getElementById('q').value.trim();
  const format = document.getElementById('format').value.trim();
  const condition = document.getElementById('condition').value.trim();
  const min = document.getElementById('min').value;
  const max = document.getElementById('max').value;

  const p = new URLSearchParams();
  if (q) p.set('q', q);
  if (format) p.set('format', format);
  if (condition) p.set('condition', condition);
  if (min !== '') p.set('min_price', min);
  if (max !== '') p.set('max_price', max);

  location.search = p.toString();
}

function matches(book, params) {
  if (params.q) {
    const hay = (book.title + " " + book.course_code).toLowerCase();
    if (!hay.includes(params.q.toLowerCase())) return false;
  }
  if (params.format && book.format !== params.format) return false;
  if (params.condition && book.condition !== params.condition) return false;
  const min = params.min === null || params.min === undefined || params.min === '' ? null : Number(params.min);
  const max = params.max === null || params.max === undefined || params.max === '' ? null : Number(params.max);
  if (min !== null && book.price < min) return false;
  if (max !== null && book.price > max) return false;
  return true;
}

function render() {
  const params = getParams();
  const books = loadBooks();
  const filtered = books.filter(b => matches(b, params));
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  document.getElementById('resultsMeta').textContent =
    `${filtered.length} result(s) • open Admin preview to test delete/toggle sold`;

  for (const b of filtered) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <h3>${b.title}</h3>
      <div class="meta">Course: ${b.course_code}</div>
      <div class="meta">Format: ${b.format}</div>
      <div class="meta">Condition: ${b.condition}</div>
      <div class="meta">Price: $${b.price.toFixed(2)}</div>
      <div class="badge ${b.sold ? 'sold' : ''}">${b.sold ? 'SOLD' : 'ACTIVE'}</div>
      <small class="note">Admin actions are on <a href="./admin-books.html">Admin Preview</a>.</small>
    `;
    grid.appendChild(div);
  }
}

document.getElementById('btn').addEventListener('click', applySearch);
document.getElementById('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') applySearch(); });
setInputsFromParams();
render();
</script>
</body>
</html>
